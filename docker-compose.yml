services:
  cloud-nest-bot-staging:
    image: node:20-alpine
    container_name: cloud-nest-bot-staging
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - ./auth_info_baileys:/app/auth_info_baileys
      - ./storage:/app/storage
    env_file:
      - .env
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  core:
    external: true

